<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <link rel="stylesheet" href="ageCalculator.css">
</head>
<body>
    <div class="container">
    <p>Age Calculator</p>
    <!---First input age-->
    <div class="date-container">
        <label for="birthDate">Date of Birth</label>
        <input type="date" name="birthDate" id="birthDate" required>
    </div>
    <!--Second input age-->
    <div class="date-container">
    <label for="currentDate">Age at the Date of</label>
    <input type="date" name="currentDate" id="currentDate" required>
    </div>
    <input type="button" value="Calculate" id="calculateBtn">
    <p id="output"></p> 
</div>
 <script src="ageCalculator.js"></script>  
</body>
</html>
